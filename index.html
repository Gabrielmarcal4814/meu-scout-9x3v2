<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Scout 9x3</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.header{display:flex;justify-content:space-between;padding:15px;background:#020617}
.logo{background:#facc15;color:#000;padding:6px 12px;border-radius:8px;font-weight:bold}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.card{background:#1e293b;padding:15px;border-radius:12px}
input,select,button{margin:4px;padding:10px;border-radius:8px;border:none}
button{background:#22c55e;font-weight:bold;cursor:pointer}
canvas{background:#fff;border-radius:10px}
</style>
</head>
<body>

<div class="header">
<div class="logo">🎲 Meu Scout 9x3</div>
<button onclick="window.print()">PDF</button>
</div>

<div class="container">

<div class="card">
<h3>Nova Partida</h3>
<input id="data" type="date">
<input id="adv" placeholder="Adversário">
<input id="gols" type="number" placeholder="Gols feitos">
<input id="sofridos" type="number" placeholder="Gols sofridos">

<select id="tipoJogo">
<option value="">Tipo</option>
<option>Amistoso</option>
<option>Open</option>
<option>Mata-Mata</option>
<option>Campeonato</option>
</select>

<select id="resultado">
<option value="">Resultado</option>
<option>V</option><option>E</option><option>D</option>
</select>

<h4>Zona do Gol</h4>
<select id="zonaGol">
<option>Longe</option><option>Médio</option><option>Perto</option><option>Pênalti</option>
</select>

<h4>Tipo Finalização</h4>
<select id="tipoGol">
<option>Quinada</option><option>Chapada</option><option>Quebrada</option><option>Bola Longa</option><option>Outras</option>
</select>

<h4>Posição do Gol</h4>
<select id="posicaoGol">
<option>Frontal</option><option>Diagonal</option><option>Meio a Meio</option><option>Sem Ângulo</option>
</select>

<h4>Tipo de Chute</h4>
<select id="chuteGol">
<option>Rasteiro Direita</option><option>Rasteiro Esquerda</option><option>Alto Direita</option><option>Alto Esquerda</option><option>Centro por cima</option><option>Quique</option>
</select>

<h4>Botão</h4>
<select id="botaoGol">
<option>Direita</option><option>Esquerda</option><option>Centro</option>
</select>

<button onclick="addJogo()">Salvar</button>
</div>

<div class="grid">
<div class="card"><b id="tj"></b><br>Jogos</div>
<div class="card"><b id="tg"></b><br>Gols</div>
<div class="card"><b id="ts"></b><br>Saldo</div>
<div class="card"><b id="ap"></b><br>Aproveitamento</div>
</div>

<div class="grid">
<div class="card"><canvas id="linha"></canvas></div>
<div class="card"><canvas id="pizza"></canvas></div>
<div class="card"><canvas id="zona"></canvas></div>
<div class="card"><canvas id="posicao"></canvas></div>
</div>

<div class="card"><h3>🏆 Ranking</h3><div id="ranking"></div></div>
<div class="card"><h3>🎯 Eficiência</h3><div id="eficiencia"></div></div>

<div class="card"><h3>📜 Histórico</h3><div id="lista"></div></div>

</div>

<script>
let jogos=JSON.parse(localStorage.getItem('jogos')||'[]');
let editIndex=null;

function salvar(){localStorage.setItem('jogos',JSON.stringify(jogos))}

function addJogo(){
let j={
data:data.value,
adversario:adv.value,
gols:+gols.value,
sofridos:+sofridos.value,
resultado:resultado.value,
tipo:tipoJogo.value,
zona:zonaGol.value,
tipoGol:tipoGol.value,
posicao:posicaoGol.value,
chute:chuteGol.value,
botao:botaoGol.value
};

if(editIndex!==null){jogos[editIndex]=j;editIndex=null;}else{jogos.push(j);} 

salvar();render();
}

function editar(i){
editIndex=i;
let j=jogos[i];
data.value=j.data;
adv.value=j.adversario;
gols.value=j.gols;
sofridos.value=j.sofridos;
resultado.value=j.resultado;
}

function del(i){jogos.splice(i,1);salvar();render()}

function render(){
let total=jogos.length;
let gols=jogos.reduce((a,b)=>a+b.gols,0);
let sofridos=jogos.reduce((a,b)=>a+b.sofridos,0);
let saldo=gols-sofridos;
let v=jogos.filter(j=>j.resultado=='V').length;
let apv=total?((v/total)*100).toFixed(1):0;

tj.innerText=total;tg.innerText=gols;ts.innerText=saldo;ap.innerText=apv+'%';

new Chart(linha,{type:'line',data:{labels:jogos.map(j=>j.data),datasets:[{data:jogos.map(j=>j.gols)}]}});

let tipos={}, zonas={}, posicoes={};
jogos.forEach(j=>{
tipos[j.tipoGol]=(tipos[j.tipoGol]||0)+1;
zonas[j.zona]=(zonas[j.zona]||0)+1;
posicoes[j.posicao]=(posicoes[j.posicao]||0)+1;
});

new Chart(pizza,{type:'pie',data:{labels:Object.keys(tipos),datasets:[{data:Object.values(tipos)}]}});
new Chart(zona,{type:'pie',data:{labels:Object.keys(zonas),datasets:[{data:Object.values(zonas)}]}});
new Chart(posicao,{type:'pie',data:{labels:Object.keys(posicoes),datasets:[{data:Object.values(posicoes)}]}});

let advStats={};
jogos.forEach(j=>{
if(!advStats[j.adversario])advStats[j.adversario]={v:0,j:0};
advStats[j.adversario].j++;
if(j.resultado=='V')advStats[j.adversario].v++;
});
let melhor='',pior='',max=0,min=999;
Object.entries(advStats).forEach(([k,v])=>{
let perc=v.v/v.j;
if(perc>max){max=perc;melhor=k}
if(perc<min){min=perc;pior=k}
});
ranking.innerHTML=`Melhor: ${melhor||'-'}<br>Pior: ${pior||'-'}`;

let ef='';
Object.entries(tipos).forEach(([k,v])=>{ef+=`${k}: ${(v/gols*100||0).toFixed(1)}%<br>`});
eficiencia.innerHTML=ef;

let html='';
jogos.forEach((j,i)=>{
html+=`${j.data} ${j.adversario} ${j.gols}-${j.sofridos} <button onclick="editar(${i})">E</button><button onclick="del(${i})">X</button><br>`});
lista.innerHTML=html;
}

render();

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
